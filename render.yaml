services:
  - type: web
    name: employee-attendance-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: employee-attendance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: INIT_ADMIN_USERNAME
        value: admin
      - key: INIT_ADMIN_PASSWORD
        value: admin123456 # 建議於部署後在 Render 後台進行修改

databases:
  - name: employee-attendance-db
    plan: free
